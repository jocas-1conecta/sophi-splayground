<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sophi's Playground — Minijuegos multijugador divertidos y seguros para jugar con tus amigas" />
    <meta name="theme-color" content="#c4a7e7" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />

  <body>
    <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#1a1225;">
      <img src="/icons/icon-192.png" alt="" width="96" height="96" style="border-radius:24px;animation:pulse 1.5s ease-in-out infinite;" />
      <p style="font-family:Quicksand,sans-serif;color:#c4a7e7;font-size:14px;opacity:0.7;">Cargando...</p>
      <style>@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.95)}}</style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
